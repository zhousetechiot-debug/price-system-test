{% extends "base.html" %}
{% block content %}
<div class="page-header"><h1>{{ title_text }}</h1><p>{{ description }}</p></div>
<form method="post" class="card" style="max-width:560px;">
  <label>目前密碼</label>
  <input type="password" name="current_password" maxlength="10" required>
  <label>新密碼</label>
  <input type="password" name="new_password" maxlength="10" required>
  <label>確認新密碼</label>
  <input type="password" name="confirm_password" maxlength="10" required>
  <div class="actions-bottom"><button type="submit">儲存密碼</button></div>
</form>
{% endblock %}
