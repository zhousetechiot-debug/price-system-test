{% extends "base.html" %}
{% block content %}
<div class="page-header"><h1>忘記密碼</h1><p>送出申請後，請由主管在後台協助重設密碼。</p></div>
<div class="card" style="max-width:620px;">
  <div class="actions-bottom" style="margin-bottom:16px;gap:8px;">
    <a href="/forgot-password?mode=internal" class="button-link {% if mode!='internal' %}secondary{% endif %}">內部帳號</a>
    <a href="/forgot-password?mode=dealer" class="button-link {% if mode!='dealer' %}secondary{% endif %}">經銷商帳號</a>
  </div>
  {% if message %}<div class="card" style="background:#ecfdf5;color:#166534;">{{ message }}</div>{% endif %}
  {% if error %}<div class="card" style="background:#fef2f2;color:#b91c1c;">{{ error }}</div>{% endif %}
  <form method="post">
    <input type="hidden" name="mode" value="{{ mode }}">
    {% if mode == 'internal' %}
      <label>內部帳號</label>
      <input type="text" name="username" placeholder="請輸入內部帳號" value="{{ username_value or '' }}" required>
    {% else %}
      <label>統一編號（帳號）</label>
      <input type="text" name="tax_id" placeholder="請輸入經銷商統編" inputmode="numeric" maxlength="10" value="{{ tax_id_value or '' }}" required>
    {% endif %}
    <div class="actions-bottom" style="justify-content:space-between;">
      <a href="{{ '/login' if mode=='internal' else '/dealer/login' }}" class="button-link secondary">返回登入</a>
      <button type="submit">送出申請</button>
    </div>
  </form>
</div>
{% endblock %}
